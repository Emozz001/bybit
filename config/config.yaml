# Bybit AI Trading Platform Configuration
# This file is auto-generated. Edit values as needed.

exchange:
  name: bybit
  testnet: true
  sandbox: true
  rate_limit_per_second: 10
  retry_attempts: 3
  timeout_seconds: 30

trading:
  mode: paper  # paper or live
  min_net_profit_pct: 0.1
  max_slippage_pct: 0.5
  max_spread_pct: 0.3
  min_liquidity_score: 70
  confidence_threshold: 85
  max_trade_size_usdt: 100.0
  min_trade_size_usdt: 10.0
  daily_loss_limit_usdt: 50.0
  max_concurrent_trades: 1
  default_leverage: 1.0
  auto_hedge_enabled: false

risk:
  max_daily_loss_usdt: 100.0
  max_daily_loss_pct: 5.0
  max_drawdown_pct: 20.0
  max_exposure_usdt: 1000.0
  max_leverage: 10.0
  max_position_size_usdt: 500.0
  max_concurrent_positions: 5
  kelly_criterion_enabled: false
  kelly_fraction: 0.25
  kill_switch_enabled: false
  stop_loss_type: fixed
  stop_loss_pct: 2.0
  trailing_stop_pct: 1.0

database:
  path: data/bybit_ai.db
  backup_enabled: true
  backup_interval_hours: 24
  max_backup_count: 7

logging:
  level: INFO
  console_output: true
  file_output: true
  log_dir: logs
  max_log_files: 7

notifications:
  enabled: false
  notify_on_trade: true
  notify_on_error: true
  notify_daily_summary: true

performance:
  profile: balanced  # low, balanced, high
  max_cpu_percent: 25.0
  max_memory_mb: 512
  websocket_ping_interval: 30
  scanner_refresh_ms: 100
  max_concurrent_requests: 5
  background_tasks_enabled: true
  analytics_enabled: true

scanner:
  enabled: true
  symbols:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
    - XRPUSDT
    - DOGEUSDT
    - ADAUSDT
    - AVAXUSDT
    - DOTUSDT
    - MATICUSDT
    - LINKUSDT
  min_confidence: 70.0
  scan_interval_seconds: 60
  max_results: 20

strategies:
  enabled_strategies:
    - triangular_arb
    - ema_cross
    - rsi_divergence
