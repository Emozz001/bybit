version: '3.8'

services:
  trading-bot:
    build: .
    container_name: bybit-trading-bot
    restart: unless-stopped
    environment:
      - BYBIT_API_KEY=${BYBIT_API_KEY:-}
      - BYBIT_SECRET_KEY=${BYBIT_SECRET_KEY:-}
      - BYBIT_TESTNET=${BYBIT_TESTNET:-true}
      - TRADING_MODE=${TRADING_MODE:-paper}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PERFORMANCE_PROFILE=${PERFORMANCE_PROFILE:-balanced}
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
    networks:
      - trading-network

networks:
  trading-network:
    driver: bridge
